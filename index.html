<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TCG Troupe Engine v3</title>
    <style>
        :root { --bg: #121212; --surface: #1e1e1e; --border: #333333; --text: #ffffff; --text-dim: #aaaaaa; --accent: #00adb5; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); padding: 15px; }
        .main-container { display: flex; flex-wrap: wrap; gap: 15px; max-width: 900px; margin: 0 auto; }
        .calculator-side { flex: 1; min-width: 300px; }
        .table-side { flex: 1; min-width: 300px; }
        .card { background: var(--surface); border: 1px solid var(--border); padding: 15px; border-radius: 8px; margin-bottom: 10px; }
        input { background: #2a2a2a; color: white; border: 1px solid var(--border); padding: 8px; width: 60px; border-radius: 4px; }
        .row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        th, td { border: 1px solid var(--border); padding: 6px; text-align: center; }
    </style>
</head>
<body>
    <div class="main-container">
        <div class="calculator-side">
            <h2>Troupe Engine</h2>
            <div class="card">
                <input type="number" id="inputM" placeholder="M" style="width: 90%; font-size: 1.5rem;" oninput="refresh()">
                <h1 id="outputPrice">£0.00</h1>
            </div>
            <div class="card" id="config">
                <div class="row"><label>Band A (<10):</label> <span>x<input id="m1" value="1.3" oninput="refresh()">+<input id="f1" value="1.50" oninput="refresh()"></span></div>
                <div class="row"><label>Band B (10-30):</label> <span>x<input id="m2" value="1.25" oninput="refresh()">+<input id="f2" value="3.50" oninput="refresh()"></span></div>
                <div class="row"><label>Band C (>30):</label> <span>x<input id="m3" value="1.2" oninput="refresh()">+<input id="f3" value="3.50" oninput="refresh()"></span></div>
            </div>
        </div>

        <div class="table-side">
            <div class="card">
                <table id="refTable">
                    <tr><th>Market Range</th><th>List Price</th></tr>
                </table>
            </div>
        </div>
    </div>

<script>
    function roundPrice(p) {
        let intP = Math.floor(p);
        let frac = p - intP;
        return (frac <= 0.49) ? intP + 0.49 : intP + 0.99;
    }

    function refresh() {
        const M = parseFloat(document.getElementById('inputM').value);
        let m = [0, parseFloat(document.getElementById('m1').value), parseFloat(document.getElementById('m2').value), parseFloat(document.getElementById('m3').value)];
        let f = [0, parseFloat(document.getElementById('f1').value), parseFloat(document.getElementById('f2').value), parseFloat(document.getElementById('f3').value)];
        
        let res = 0;
        if(!isNaN(M)) {
            if(M < 10) res = roundPrice((M * m[1]) + f[1]);
            else if(M <= 30) res = roundPrice((M * m[2]) + f[2]);
            else res = roundPrice((M * m[3]) + f[3]);
            document.getElementById('outputPrice').innerText = "£" + res.toFixed(2);
        }

        // Build Table
        let table = document.getElementById('refTable');
        table.innerHTML = "<tr><th>Market Range</th><th>List Price</th></tr>";
        // Customize these steps based on what you sort most often
        [2, 5, 8, 10, 15, 25, 40, 50].forEach(val => {
            let p = 0;
            if(val < 10) p = roundPrice((val * m[1]) + f[1]);
            else if(val <= 30) p = roundPrice((val * m[2]) + f[2]);
            else p = roundPrice((val * m[3]) + f[3]);
            table.innerHTML += `<tr><td>£${val.toFixed(2)}</td><td>£${p.toFixed(2)}</td></tr>`;
        });
    }
    refresh();
</script>
</body>
</html>
