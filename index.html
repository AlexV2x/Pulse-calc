<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TCG Troupe Margin Engine</title>
    <style>
        :root {
            --bg: #121212; --surface: #1e1e1e; --border: #333333;
            --text: #ffffff; --text-dim: #aaaaaa; --accent: #00adb5;
        }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); padding: 16px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 480px; }
        .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px; margin-bottom: 16px; }
        .card-title { font-size: 0.8rem; color: var(--accent); text-transform: uppercase; margin-bottom: 12px; font-weight: 800; }
        .row { display: flex; gap: 8px; margin-bottom: 8px; align-items: center; }
        input { background: #2a2a2a; border: 1px solid var(--border); color: var(--text); padding: 8px; border-radius: 6px; flex: 1; text-align: center; }
        .result-main { text-align: center; font-size: 2rem; font-weight: 700; color: var(--accent); }
        .profit-bar { display: flex; justify-content: space-between; margin-top: 10px; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="container">
    <h2>TCG PROFIT ENGINE</h2>

    <div class="card">
        <input type="number" id="marketPrice" step="0.01" placeholder="Enter Market Price (M)" oninput="runAll()" style="font-size: 1.2rem; width: 100%;">
        <div class="result-main" id="finalListPrice">£0.00</div>
        <div class="profit-bar">
            <span>Net Profit: <b id="netProfit">£0.00</b></span>
            <span>Margin: <b id="netMargin">0%</b></span>
        </div>
    </div>

    <div class="card">
        <div class="card-title">Fee Stack & Fulfillment</div>
        <div class="row">
            <label>FVF %:</label><input type="number" id="fvf" value="10.9" oninput="runAll()">
            <label>VAT %:</label><input type="number" id="vat" value="20" oninput="runAll()">
        </div>
        <div class="row">
            <label>Reg Fee %:</label><input type="number" id="regFee" value="0.35" oninput="runAll()">
            <label>Fix Fee:</label><input type="number" id="fixFee" value="0.30" oninput="runAll()">
        </div>
        <div class="row">
            <label>Postage:</label><input type="number" id="postage" value="1.06" oninput="runAll()">
            <label>Buy %:</label><input type="number" id="buyRate" value="75" oninput="runAll()">
        </div>
    </div>

    <div class="card">
        <div class="card-title">Pricing Logic</div>
        <div id="tiers"></div>
    </div>
</div>

<script>
    const tiers = [
        { min: 0, max: 9.99, mult: 1.3, fee: 1.5 },
        { min: 10, max: 30, mult: 1.25, fee: 3.5 },
        { min: 30.01, max: 9999, mult: 1.2, fee: 3.5 }
    ];

    function runAll() {
        const M = parseFloat(document.getElementById('marketPrice').value) || 0;
        if (M === 0) return;

        // 1. Calculate List Price
        let tier = tiers.find(t => M >= t.min && M <= t.max);
        if (!tier) return;
        let base = (M * tier.mult) + tier.fee;
        let finalPrice = (base - Math.floor(base) <= 0.49) ? Math.floor(base) + 0.49 : Math.floor(base) + 0.99;
        document.getElementById('finalListPrice').innerText = "List: £" + finalPrice.toFixed(2);

        // 2. Calculate Profitability
        const fvf = parseFloat(document.getElementById('fvf').value) / 100;
        const vat = parseFloat(document.getElementById('vat').value) / 100;
        const reg = parseFloat(document.getElementById('regFee').value) / 100;
        const fix = parseFloat(document.getElementById('fixFee').value);
        const post = parseFloat(document.getElementById('postage').value);
        const buyRate = parseFloat(document.getElementById('buyRate').value) / 100;

        let feeBase = finalPrice * (fvf + reg);
        let totalFees = (feeBase * (1 + vat)) + fix;
        let cogs = M * buyRate;
        let netProfit = finalPrice - totalFees - post - cogs;
        let margin = (netProfit / finalPrice) * 100;

        document.getElementById('netProfit').innerText = "£" + netProfit.toFixed(2);
        document.getElementById('netMargin').innerText = margin.toFixed(1) + "%";
    }
    window.onload = runAll;
</script>
</body>
</html>
